# Portul API-ului StorageAdvisor (8080 era deja ocupat pe mediul de dezvoltare)
server.port=8089

# Limita pentru sursele Solidity trimise in corpul cererii
spring.servlet.multipart.max-request-size=2MB

# Folderul cu contractele exemplu expuse prin GET /api/examples
storageadvisor.examples.dir=dataset/synthetic

# Raportul bulk „înghețat" citit de GET /api/bulk-report (generat de cli.BulkAnalyzer)
storageadvisor.bulk-report.path=reports/bulk-report.csv

# Rădăcina dataset-ului, pentru a deschide un contract în Analizor la click în raport
storageadvisor.dataset.dir=dataset
